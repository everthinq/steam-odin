version: '3.8'

services:
  # HEIMDALL: Authenticator (The Watchman)
  heimdall-backend:
    restart: unless-stopped
    build: ./Yggdrasil/heimdall/backend
    # Note: With network_mode: "host", ports mapping is ignored.
    # The app will be accessible directly on host:5000 (or PORT env var)
    ports:
      - "5001:5000"
    volumes:
      - ./Yggdrasil/heimdall/backend:/app
      - /etc/localtime:/etc/localtime:ro
    environment:
      - FLASK_ENV=development
      - PORT=5000
      - RATATOSKR_URL=http://ratatoskr:3000
      - HEIMDALL_SECRET_KEY=${HEIMDALL_SECRET_KEY:-change_this_to_a_secure_random_string_in_production}
      # Proxy settings to change outbound IP and avoid Steam rate limits (HTTP 429)
      # Uncomment and set these environment variables to use a proxy/VPN:
      #
      # For HTTP/HTTPS proxy:
      # - HTTP_PROXY=http://proxy-host:port
      # - HTTPS_PROXY=http://proxy-host:port
      # - NO_PROXY=localhost,127.0.0.1
      #
      # For SOCKS5 proxy (VPN):
      # - SOCKS_PROXY=socks5://user:pass@proxy-host:port
      #   or without auth: SOCKS_PROXY=socks5://proxy-host:port
      #
      # Example: SOCKS_PROXY=socks5://127.0.0.1:1080 (local SOCKS proxy)
      # Example: HTTP_PROXY=http://proxy.example.com:8080
    command: python app.py

  heimdall-frontend:
    build: ./Yggdrasil/heimdall/frontend
    ports:
      - "3000:5173"
    volumes:
      - ./Yggdrasil/heimdall/frontend:/app
      - /app/node_modules
    environment:
      - WATCHPACK_POLLING=true
    depends_on:
      - heimdall-backend

  # RATATOSKR: Casemove/Courier Service (Node.js)
  ratatoskr:
    build: ./Yggdrasil/ratatoskr
    ports:
      - "3001:3000"
    environment:
      - PORT=3000
      - HEIMDALL_API_URL=http://heimdall-backend:5000
      - MOVE_DELAY_MS=400
    volumes:
      - ./Yggdrasil/ratatoskr:/app
      - /app/node_modules
